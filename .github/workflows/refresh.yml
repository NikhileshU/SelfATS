name: Refresh job cache

on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run refresh
        run: uv run job-aggregator-refresh

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/job_aggregator/storage/jobs.db
          git diff --cached --quiet || git commit -m "chore: scheduled job cache refresh"
          git push
